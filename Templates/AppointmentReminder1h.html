<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 600px;
            margin: 40px auto;
            background: #fff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .header {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        .content {
            padding: 40px 30px;
        }

        .urgent-notice {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 20px;
            margin: 25px 0;
            border-radius: 4px;
        }

        .footer {
            background: #f8f9fa;
            padding: 30px;
            text-align: center;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⏰ Your Appointment is Soon!</h1>
        </div>
        <div class="content">
            <h2>Hi {{patient_name}},</h2>
            <div class="urgent-notice">
                <p style="margin: 0; font-size: 18px; font-weight: bold;">⚠️ Your appointment is in approximately 1 hour!</p>
            </div>
            <p><strong>👨‍⚕️ Doctor:</strong> {{doctor_name}} ({{specialization}})</p>
            <p><strong>🕐 Time:</strong> {{appointment_time}}</p>
            <p><strong>📍 Please remember to arrive 10 minutes early.</strong></p>
        </div>
        <div class="footer">
            <p>Medical Clinic</p>
        </div>
    </div>
</body>
</html>
